name: Docker Publish

on:
  push:
    branches:
      - main
      - master
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Calculate image version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            raw_version="${{ github.event.release.tag_name }}"
          else
            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
            if [[ -z "$latest_tag" ]]; then
              latest_tag="v0.0.0"
            fi

            version="${latest_tag#v}"
            IFS=. read -r major minor patch <<< "$version"
            patch="$((patch + 1))"
            raw_version="v${major}.${minor}.${patch}"
          fi

          version="${raw_version#v}"
          IFS=. read -r major minor patch <<< "$version"
          if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
            echo "Invalid semantic version: $raw_version" >&2
            exit 1
          fi

          short_sha="$(git rev-parse --short=12 HEAD)"
          image="${REGISTRY}/${IMAGE_NAME}"

          {
            echo "tag=v${version}"
            echo "version=${version}"
            echo "major_minor=${major}.${minor}"
            echo "short_sha=${short_sha}"
            echo "tags<<EOF"
            echo "${image}:${version}"
            echo "${image}:v${version}"
            echo "${image}:${major}.${minor}"
            echo "${image}:sha-${short_sha}"
            echo "${image}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create git version tag
        if: github.event_name != 'release'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
